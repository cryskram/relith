run:
  go: "1.26"
  timeout: 3m

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
    - bodyclose
    - gocritic

linters-settings:
  revive:
    rules:
      - name: exported
        severity: warning
  gocritic:
    enabled-checks:
      - appendCombine
      - argOrder
      - badCond
      - boolExprSimplify
      - builtinShadow
      - captLocal
      - commentFormatting
      - deferInLoop
      - elseif
      - emptyStringTest
      - equalFold
      - evalOrder
      - httpNoBody
      - hugeParam
      - ifElseChain
      - importShadow
      - initClause
      - methodExprCall
      - nestingReduce
      - newDeref
      - nilValReturn
      - ptrToRefParam
      - rangeValCopy
      - regexpMust
      - sloppyReassign
      - stringConcatSimplify
      - switchTrue
      - timeExprSimplify
      - todoCommentWithoutDetail
      - typeUnparen
      - underef
      - unlabelStmt
      - unslice
      - valSwap
      - weakCond

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec
    - path: internal/db/
      linters:
        - revive

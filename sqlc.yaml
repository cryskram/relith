version: "2"
sql:
  - engine: "sqlite"
    schema: "sql/migrations/"
    queries: "sql/queries/"
    gen:
      go:
        package: "db"
        out: "internal/db"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_empty_slices: true
        emit_exact_table_names: false
